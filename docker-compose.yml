version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: org_api_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       ${DB_NAME:-orgapi}
    ports:
      - "${DB_PORT_EXPOSE:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-orgapi}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: org_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy   # ждём healthcheck postgres
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST:     postgres          # имя сервиса в docker-compose сети
      DB_PORT:     5432
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME:     ${DB_NAME:-orgapi}
      DB_SSLMODE:  disable
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  postgres_data: